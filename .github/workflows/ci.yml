name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.2", "8.3"]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
      # Resolve errorgap/errorgap from source until it is on Packagist;
      # delete this line once the package is published there.
      - run: composer config repositories.errorgap-php vcs https://github.com/errorgaphq/errorgap-php
      - run: composer update --prefer-dist --no-progress
      - run: composer test
